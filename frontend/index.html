<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="TaskFlow — A powerful task management system for teams. Organize projects, track tasks, and manage sprints with an intuitive Kanban board." />
  <meta name="theme-color" content="#0f0f1a" />
  <title>TaskFlow — Task Management System</title>

  <!-- Design System -->
  <link rel="stylesheet" href="/static/css/variables.css" />
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
  <link rel="stylesheet" href="/static/css/pages.css" />

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
</head>

<body>
  <div id="app">
    <!-- Loading screen while JS boots -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
      <div class="spinner spinner-lg"></div>
      <p style="color:var(--color-text-tertiary);font-size:14px;">Loading TaskFlow...</p>
    </div>
  </div>

  <!-- Core JS -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/router.js"></script>

  <!-- Components -->
  <script src="/static/js/components/toast.js"></script>
  <script src="/static/js/components/modal.js"></script>
  <script src="/static/js/components/sidebar.js"></script>
  <script src="/static/js/components/header.js"></script>
  <script src="/static/js/components/taskCard.js"></script>

  <!-- Pages -->
  <script src="/static/js/pages/login.js"></script>
  <script src="/static/js/pages/register.js"></script>
  <script src="/static/js/pages/dashboard.js"></script>
  <script src="/static/js/pages/board.js"></script>
  <script src="/static/js/pages/tasks.js"></script>
  <script src="/static/js/pages/projects.js"></script>
  <script src="/static/js/pages/organizations.js"></script>
  <script src="/static/js/pages/users.js"></script>
  <script src="/static/js/pages/settings.js"></script>

  <!-- App Init (must be last) -->
  <script src="/static/js/app.js"></script>
</body>

</html>
